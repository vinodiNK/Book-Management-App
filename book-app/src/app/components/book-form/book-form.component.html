<h2>{{ bookData.id ? 'Edit Book' : 'Add Book' }}</h2>
<form (ngSubmit)="saveBook()">
    <input type="text" placeholder="Title" [(ngModel)]="bookData.title" name="title" required><br><br>
    <input type="text" placeholder="Author" [(ngModel)]="bookData.author" name="author" required><br><br>
    <input type="text" placeholder="ISBN" [(ngModel)]="bookData.isbn" name="isbn" required><br><br>
    <input type="date" placeholder="Publication Date" [(ngModel)]="bookData.publicationDate" name="publicationDate" required><br><br>
    <button type="submit">{{ bookData.id ? 'Update' : 'Add' }}</button>
    <button type="button" (click)="resetForm()">Cancel</button>
</form>
